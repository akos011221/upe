name: UPE CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libpthread-stubs0-dev pkg-config

      - name: Mock libdpdk workaround for CI
        run: |
          mkdir -p ./mock_pkgconfig

          # Placeholder files, so #include <rte_eal.h> and others resolve.
          touch router/bench/rte_eal.h
          touch router/bench/rte_ethdev.h
          touch router/bench/rte_ether.h
          touch router/bench/rte_mbuf.h

          cat << 'EOF' > ./mock_pkgconfig/libdpdk.pc
          prefix=/usr
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: libdpdk
          Description: Dummy DPDK so CI doesn't fail
          Version: 23.11.0
          Libs: -L${libdir}
          Cflags: -I${includedir}
          EOF

          echo "PKG_CONFIG_PATH=${{ github.workspace }}/mock_pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          # Macro guards with CFLAGS to bypass header lookups so it won't try to locate these
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-D_RTE_EAL_H_ -D_RTE_ETHDEV_H_ -D_RTE_ETHER_H_ -D_RTE_MBUF_H_"

      - name: Compile Executables
        run: |
          cmake --build build --config Release --target test_forwarding --target bench_mac_table

      - name: Run Unit Tests
        run: |
          ctest --test-dir build -L Unit --output-on-failure

      - name: Run Benchmarks
        run: |
          ctest --test-dir build -L Bench --output-on-failure